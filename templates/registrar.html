{% extends "base.html" %}

{% block title %}Registro - Paleo Prints{% endblock %}

{% block content %}
<style>
    :root {
        --verde-oscuro: #1a3c34;
        --azul-footer: #2c4a7c;
        --gris-texto: #666;
    }

    .login-body-wrapper {
        background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                          url("{{ url_for('static', filename='imagenes/fosil.jpg') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        top: 0; left: 0; width: 100%;
        z-index: 1050; 
    }

    .login-card {
        background: white;
        border-radius: 12px;
        width: 100%;
        max-width: 450px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .login-content { padding: 30px 45px 20px 45px; position: relative; }

    .back-btn {
        position: absolute;
        top: 20px; left: 20px;
        color: var(--gris-texto);
        text-decoration: none;
        font-size: 1.2rem;
    }

    .login-logo { display: block; margin: 0 auto 10px; height: 50px; }

    .login-header h2 { color: #2c4a7c; font-weight: 700; margin-bottom: 5px; }
    .login-header p { color: #999; font-size: 0.85rem; margin-bottom: 20px; }

    .custom-label { font-size: 0.8rem; font-weight: 500; color: #444; margin-bottom: 5px; }
    .custom-input { border: 1px solid #ced4da; border-radius: 8px; padding: 8px; margin-bottom: 12px; }

    .btn-registro {
        background-color: #2c4a7c;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        font-weight: 600;
        margin-top: 10px;
    }

    .login-footer { background-color: #333; padding: 20px; text-align: center; }
    .login-footer p { color: white; font-size: 0.85rem; margin-bottom: 10px; }
    .btn-to-login {
        background-color: #1a3c34;
        color: white;
        padding: 8px 25px;
        border-radius: 6px;
        text-decoration: none;
        display: inline-block;
        font-size: 0.9rem;
    }
</style>

<div class="login-body-wrapper">
    <div class="login-card">
        <div class="login-content">
            <a href="{{ url_for('home') }}" class="back-btn">&#10094;</a>
            
            <div class="login-header text-center">
                <img src="{{ url_for('static', filename='imagenes/LogotipoSVG.svg') }}" class="login-logo">
                <h2>Registro</h2>
                <p>Para realizar compras</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2" style="font-size: 0.8rem;">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('registrar') }}" method="POST">
                <div class="d-flex flex-column">
                    <label class="custom-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control custom-input" required>
                </div>

                <div class="d-flex flex-column">
                    <label class="custom-label">Correo</label>
                    <input type="email" name="correo" class="form-control custom-input" required>
                </div>

                <div class="d-flex flex-column">
                    <div class="d-flex justify-content-between">
                        <label class="custom-label">Contraseña</label>
                        <span style="font-size: 0.7rem; color: #2c4a7c; cursor: pointer;">👁 Ocultar</span>
                    </div>
                    <input type="password" name="password" class="form-control custom-input" required>
                </div>

                <div class="d-flex flex-column">
                    <label class="custom-label">Confirmar contraseña</label>
                    <input type="password" name="cpassword" class="form-control custom-input" required>
                </div>

                <button type="submit" class="btn btn-registro w-100">Crear Cuenta</button>
            </form>
        </div>

        <div class="login-footer">
            <p>¿Ya tienes una cuenta?</p>
            <a href="{{ url_for('login') }}" class="btn-to-login">Inicia sesión</a>
        </div>
    </div>
</div>
{% endblock %}
