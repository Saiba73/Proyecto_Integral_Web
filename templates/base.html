<!-- base.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Paleo Prints{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="../static/imagenes/IsotipoSVG.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="
  {% if categoria_producto == 'ropa' %}era-meso
  {% elif categoria_producto == 'tazas' %}era-ceno
  {% elif categoria_producto == 'impresiones' %}era-paleo
  {% elif request.endpoint in ['home', 'ropa'] %}era-meso
  {% elif request.endpoint == 'tazas' %}era-ceno
  {% elif request.endpoint == 'impresiones' %}era-paleo
  {% else %}era-paleo{% endif %}
">

<!-- Include the navbar -->
{% include 'navbar.html' %}

<!-- Main content block -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>


{% include 'footer.html'%}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
